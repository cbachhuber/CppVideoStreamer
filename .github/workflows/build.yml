name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
    - name: check out git repository
      uses: actions/checkout@v4
    - name: cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: build-essential cmake ffmpeg libx264-dev x264 libopencv-dev libva-dev libsdl2-dev
        version: 1.0 # bump this if you change the package list to invalidate the cache
    - name: configure
      run: mkdir -p build && cd build && cmake ..
    - name: build
      run: cd build && cmake --build .
